x-ml-image: &ml-image
  image: habitus-ml:local
  build:
    context: .
    dockerfile: Dockerfile.ml

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: habitus
      POSTGRES_PASSWORD: habitus
      POSTGRES_DB: habitus
    ports:
      - "5544:5432"
    volumes:
      - habitus_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitus -d habitus"]
      interval: 5s
      timeout: 3s
      retries: 10

  ml-model-cache:
    <<: *ml-image
    command: ["python", "-m", "habitus.online.preload_models"]
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - habitus_hf:/root/.cache/huggingface
    restart: "no"

  ml-service:
    <<: *ml-image
    environment:
      DB_DSN: postgresql://habitus:habitus@db:5432/habitus
      HF_HOME: /root/.cache/huggingface
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ORS_API_KEY: ${ORS_API_KEY:-}
    volumes:
      - habitus_hf:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      ml-model-cache:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      # Model files are downloaded by ml-model-cache. The Go backend performs
      # one synchronous /search before opening its HTTP listener so this
      # process has also loaded the cached weights into memory.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    environment:
      DB_DSN: postgresql://habitus:habitus@db:5432/habitus
      ML_SERVICE_URL: http://ml-service:8000
      ML_SEARCH_TIMEOUT_S: "60"
      ML_WARMUP_TIMEOUT_S: "600"
      ML_DOSSIER_TIMEOUT_S: "30"
      ML_OBJECT_ASK_TIMEOUT_S: "45"
      HTTP_PORT: "8080"
      SESSION_COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGIN: "http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  habitus_pg:
  habitus_hf:
