<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rechSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2c38"/>
      <stop offset="55%" stop-color="#3c3e58"/>
      <stop offset="100%" stop-color="#565a86"/>
    </linearGradient>
    <linearGradient id="rechWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4d70"/>
      <stop offset="100%" stop-color="#34364c"/>
    </linearGradient>
    <radialGradient id="rechGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c8cff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="rechBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#rechSky)"/>
  <circle cx="600" cy="260" r="200" fill="url(#rechGlow)" filter="url(#rechBlur)" opacity="0.5"/>

  <!-- bridge pylons -->
  <g fill="#1d1e26">
    <rect x="270" y="180" width="26" height="480"/>
    <rect x="900" y="180" width="26" height="480"/>
  </g>

  <!-- bridge arch, single sweeping curve -->
  <path d="M 40 470 Q 600 220 1160 470" fill="none" stroke="#1d1e26" stroke-width="10"/>

  <!-- suspension cables -->
  <g stroke="#484c72" stroke-width="2" opacity="0.8">
    <line x1="140" y1="470" x2="283" y2="270"/>
    <line x1="200" y1="470" x2="283" y2="320"/>
    <line x1="340" y1="470" x2="283" y2="240"/>
    <line x1="420" y1="470" x2="500" y2="300"/>
    <line x1="780" y1="470" x2="700" y2="300"/>
    <line x1="860" y1="470" x2="913" y2="240"/>
    <line x1="1000" y1="470" x2="913" y2="320"/>
    <line x1="1060" y1="470" x2="913" y2="270"/>
  </g>

  <!-- cable lights, accent glow dots -->
  <g fill="#7c8cff">
    <circle cx="283" cy="270" r="4"/>
    <circle cx="283" cy="240" r="4"/>
    <circle cx="913" cy="240" r="4"/>
    <circle cx="913" cy="270" r="4"/>
    <circle cx="600" cy="223" r="5"/>
  </g>

  <!-- riverbank silhouettes -->
  <g fill="#20212a">
    <rect x="0" y="560" width="150" height="140"/>
    <rect x="150" y="590" width="90" height="110"/>
    <rect x="980" y="580" width="100" height="120"/>
    <rect x="1080" y="600" width="120" height="100"/>
  </g>

  <!-- water -->
  <rect x="0" y="700" width="1200" height="100" fill="url(#rechWater)"/>
  <g stroke="#7c8cff" stroke-opacity="0.25" stroke-width="2">
    <line x1="0" y1="730" x2="1200" y2="730"/>
    <line x1="0" y1="760" x2="1200" y2="760"/>
  </g>
</svg>
