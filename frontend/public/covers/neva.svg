<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="nevaSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef0fb"/>
      <stop offset="62%" stop-color="#dfe2f4"/>
      <stop offset="100%" stop-color="#c9cdec"/>
    </linearGradient>
    <linearGradient id="nevaWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b7bce3"/>
      <stop offset="100%" stop-color="#9fa5d9"/>
    </linearGradient>
    <radialGradient id="nevaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c8cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="nevaBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#nevaSky)"/>

  <!-- soft light behind the tallest tower -->
  <circle cx="705" cy="330" r="150" fill="url(#nevaGlow)" filter="url(#nevaBlur)"/>

  <!-- skyline silhouette -->
  <g fill="#23242b">
    <rect x="80"  y="470" width="120" height="180"/>
    <rect x="210" y="410" width="90"  height="240"/>
    <rect x="310" y="500" width="70"  height="150"/>
    <rect x="392" y="440" width="110" height="210"/>
    <rect x="512" y="380" width="80"  height="270"/>
    <rect x="620" y="300" width="150" height="350" rx="2"/>
    <rect x="790" y="430" width="95"  height="220"/>
    <rect x="895" y="470" width="130" height="180"/>
    <rect x="1035" y="500" width="85" height="150"/>
  </g>

  <!-- windows on the tall tower, accent-tinted -->
  <g fill="#7c8cff" opacity="0.55">
    <rect x="640" y="330" width="10" height="14"/>
    <rect x="665" y="330" width="10" height="14"/>
    <rect x="690" y="330" width="10" height="14"/>
    <rect x="640" y="365" width="10" height="14"/>
    <rect x="665" y="365" width="10" height="14"/>
    <rect x="690" y="365" width="10" height="14"/>
    <rect x="640" y="400" width="10" height="14"/>
    <rect x="665" y="400" width="10" height="14"/>
    <rect x="690" y="400" width="10" height="14"/>
  </g>

  <!-- waterline -->
  <rect x="0" y="650" width="1200" height="150" fill="url(#nevaWater)"/>

  <!-- reflection, mirrored + faded -->
  <g fill="#23242b" opacity="0.16" transform="translate(0,1300) scale(1,-1)">
    <rect x="80"  y="470" width="120" height="120"/>
    <rect x="210" y="410" width="90"  height="150"/>
    <rect x="392" y="440" width="110" height="130"/>
    <rect x="620" y="300" width="150" height="180"/>
    <rect x="895" y="470" width="130" height="120"/>
  </g>

  <!-- gentle water lines -->
  <g stroke="#eef0fb" stroke-opacity="0.35" stroke-width="2">
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="0" y1="735" x2="1200" y2="735"/>
    <line x1="0" y1="770" x2="1200" y2="770"/>
  </g>
</svg>
