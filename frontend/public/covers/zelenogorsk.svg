<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="zelSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef0fb"/>
      <stop offset="70%" stop-color="#e3e6f7"/>
      <stop offset="100%" stop-color="#d3d7f0"/>
    </linearGradient>
    <linearGradient id="zelGulf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c3c8ec"/>
      <stop offset="100%" stop-color="#aab0e0"/>
    </linearGradient>
    <radialGradient id="zelSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#7c8cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="zelBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#zelSky)"/>

  <!-- wide horizon composition -->
  <circle cx="600" cy="470" r="130" fill="url(#zelSun)" filter="url(#zelBlur)"/>
  <circle cx="600" cy="470" r="46" fill="#f3f4fd" opacity="0.9"/>

  <rect x="0" y="470" width="1200" height="330" fill="url(#zelGulf)"/>

  <!-- horizon line -->
  <line x1="0" y1="470" x2="1200" y2="470" stroke="#8f96d6" stroke-width="2" opacity="0.6"/>

  <!-- distant building, small, right edge -->
  <g fill="#2c2d33" opacity="0.85">
    <rect x="1040" y="404" width="26" height="66"/>
    <rect x="1072" y="424" width="20" height="46"/>
    <rect x="1096" y="440" width="16" height="30"/>
  </g>

  <!-- gulf ripples -->
  <g stroke="#f3f4fd" stroke-opacity="0.4" stroke-width="2">
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="590" x2="1200" y2="590"/>
    <line x1="0" y1="645" x2="1200" y2="645"/>
    <line x1="0" y1="705" x2="1200" y2="705"/>
  </g>

  <!-- foreground reeds silhouette, bottom-left -->
  <g stroke="#23242b" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <line x1="60" y1="800" x2="40" y2="690"/>
    <line x1="90" y1="800" x2="80" y2="670"/>
    <line x1="120" y1="800" x2="130" y2="700"/>
    <line x1="150" y1="800" x2="150" y2="680"/>
  </g>
</svg>
